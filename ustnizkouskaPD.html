    {

    {

function init() {
    const nav = document.getElementById('navGrid');
    const area = document.getElementById('content-area');

    topics.forEach((t, i) => {
        let btn = document.createElement('div');
        btn.className = 'nav-item';
        btn.id = `nav-${i}`;
        btn.innerText = t.title;
        btn.onclick = () => scrollToTopic(i);
        nav.appendChild(btn);

        let card = document.createElement('div');
        card.className = 'study-card';
        card.id = `topic-${i}`;
        card.innerHTML = `
            <span class="category-label">Zkušební okruh ${i+1}</span>
            <h2>${t.title}</h2>
            <ul class="key-points">
                ${t.points.map(p => `<li>${p}</li>`).join('')}
            </ul>
            <div class="expert-tip">
                <strong>💡 Tip pro ústní část:</strong> ${t.tip}
            </div>
        `;
        area.appendChild(card);
    });

    const mainContent = document.getElementById('main-content');
    mainContent.onscroll = () => {
        let current = "";
        topics.forEach((_, i) => {
            const el = document.getElementById(`topic-${i}`);
            if (el.offsetTop - 100 <= mainContent.scrollTop) {
                current = i;
            }
        });
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (current !== "") {
            document.getElementById(`nav-${current}`).classList.add('active');
        }
    };
}

function scrollToTopic(i) {
    document.getElementById(`topic-${i}`).scrollIntoView({behavior: 'smooth'});
}

init();
</script>
